esphome:
  platformio_options:
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    board_flash.download: "0x132000+0xAE000"
    board_flash.calibration: "0x1E0000+0x1000"
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // FIXED: Removed the '&' symbol.
          // id(snd_sw) is already the pointer we need.
          id(my_dreo).sound_switch = id(snd_sw);
          id(my_dreo).display_switch = id(disp_sw);
          id(my_dreo).child_lock_switch = id(lock_sw);
          id(my_dreo).window_switch = id(win_sw);
          id(my_dreo).temp_unit_switch = id(temp_unit_sw);
          
          id(my_dreo).heat_level_number = id(level_num);
          id(my_dreo).timer_number = id(timer_num);
          id(my_dreo).calibration_number = id(cal_num);

logger:
  baud_rate: 0

uart:
  - id: !remove uartdefault
  - id: tuya_uart
    tx_pin: TX1
    rx_pin: RX1
    baud_rate: 115200

external_components:
  - source:
      type: git
      url: https://github.com/lygris/dreo_heater.git
    refresh: 0s

# Now you can use it like a native ESPHome platform!
climate:
  - platform: dreo_heater
    id: my_dreo
    uart_id: tuya_uart
    name: "Dreo Heater"

script:
  - id: auto_relock
    mode: restart
    then:
      - delay: 2min
      - switch.turn_on: lock_sw

switch:
  - platform: template
    name: "Sound"
    id: snd_sw
    icon: mdi:volume-high
    optimistic: true
    turn_on_action:
      - lambda: 'id(my_dreo).set_sound(true);'
    turn_off_action:
      - lambda: 'id(my_dreo).set_sound(false);'

  - platform: template
    name: "Display"
    id: disp_sw
    icon: mdi:monitor
    optimistic: true
    turn_on_action:
      - lambda: 'id(my_dreo).set_display(true);'
    turn_off_action:
      - lambda: 'id(my_dreo).set_display(false);'

  - platform: template
    name: "Child Lock"
    id: lock_sw
    icon: mdi:lock
    optimistic: true
    turn_on_action:
      - lambda: 'id(my_dreo).set_child_lock(true);'
      - script.stop: auto_relock
    turn_off_action:
      - lambda: 'id(my_dreo).set_child_lock(false);'
      - script.execute: auto_relock

  - platform: template
    name: "Window Detection"
    id: win_sw
    icon: mdi:window-open
    optimistic: true
    turn_on_action:
      - lambda: 'id(my_dreo).set_window_mode(true);'
    turn_off_action:
      - lambda: 'id(my_dreo).set_window_mode(false);'

  - platform: template
    name: "Fahrenheit Units"
    id: temp_unit_sw
    icon: mdi:temperature-fahrenheit
    optimistic: true
    turn_on_action:
      - lambda: 'id(my_dreo).set_temp_unit(true);'
    turn_off_action:
      - lambda: 'id(my_dreo).set_temp_unit(false);'

number:
  - platform: template
    name: "Heat Level (Manual)"
    id: level_num
    icon: mdi:fire
    min_value: 1
    max_value: 3
    step: 1
    optimistic: true
    set_action:
      - lambda: 'id(my_dreo).set_heat_level((int)x);'

  - platform: template
    name: "Temp Calibration"
    id: cal_num
    icon: mdi:thermometer-plus
    min_value: -10
    max_value: 10
    step: 1
    unit_of_measurement: "°F"
    optimistic: true
    set_action:
      - lambda: 'id(my_dreo).set_calibration((int)x);'

  - platform: template
    name: "Timer (Minutes)"
    id: timer_num
    icon: mdi:timer-outline
    min_value: 0
    max_value: 1440
    step: 60
    unit_of_measurement: "min"
    optimistic: true
    set_action:
      - lambda: 'id(my_dreo).set_timer((int)x);'

